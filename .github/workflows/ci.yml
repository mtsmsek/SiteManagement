name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (.NET 10 + Postgres 16)
    runs-on: ubuntu-latest

    # A real Postgres service container is wired from day one so the E2E
    # project (W2 onward) can hit a database without docker-in-docker.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sitemanagement
          POSTGRES_PASSWORD: sitemanagement_ci_pw
          POSTGRES_DB: sitemanagement
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sitemanagement -d sitemanagement"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=sitemanagement;Username=sitemanagement;Password=sitemanagement_ci_pw"
      Jwt__Key: "ci-only-secret-please-change-me-at-least-32-chars"
      Jwt__Issuer: "SiteManagement"
      Jwt__Audience: "SiteManagement.Clients"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build (warnings as errors enforced by csproj)
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test
          --no-build
          --configuration Release
          --settings coverlet.runsettings
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ runner.temp }}/test-results

      - name: Render coverage HTML
        if: always()
        shell: bash
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            "-reports:${{ runner.temp }}/test-results/**/coverage.cobertura.xml" \
            "-targetdir:${{ runner.temp }}/coverage-html" \
            "-reporttypes:Html;TextSummary;Badges"

      - name: Summarise coverage
        if: always()
        shell: bash
        run: |
          summary="${{ runner.temp }}/coverage-html/Summary.txt"
          if [[ -f "$summary" ]]; then
            {
              echo "## Coverage"
              echo
              echo '```'
              head -n 20 "$summary"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/test-results
          if-no-files-found: ignore

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: ${{ runner.temp }}/coverage-html
          if-no-files-found: ignore
