# SiteManagement local dev stack.
# Run with: `docker compose up -d --build`
#
# Services:
#   postgres  : main relational DB (Identity, Property, Residency, Tenancy, Billing, Messaging)
#   mongo       : payment service DB (W4)
#   mailhog     : SMTP catcher (1025) + UI (8025)
#   api         : SiteManagement.Api on :${API_PORT}
#   payment-api : PaymentService.Api on :${PAYMENT_API_PORT} (W4, Mongo-backed)

services:

  postgres:
    image: postgres:16-alpine
    container_name: sitemgmt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sitemanagement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sitemanagement_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-sitemanagement}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sitemanagement} -d ${POSTGRES_DB:-sitemanagement}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: sitemgmt-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-mongoroot}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_dev_pw}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sitemgmt-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

  api:
    build:
      context: .
      dockerfile: src/SiteManagement.Api/Dockerfile
    container_name: sitemgmt-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      payment-api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-sitemanagement};Username=${POSTGRES_USER:-sitemanagement};Password=${POSTGRES_PASSWORD:-sitemanagement_dev_pw}
      Smtp__Host: mailhog
      Smtp__Port: "1025"
      # Outbound payment-service integration (Refit + Polly use these).
      PaymentService__BaseUrl: http://payment-api:8090
      PaymentService__ApiKey: ${PAYMENT_API_KEY:-dev-payment-api-key}
      Jwt__Key: ${JWT_KEY:-dev-only-secret-please-change-me-at-least-32-chars}
      Jwt__Issuer: ${JWT_ISSUER:-SiteManagement}
      Jwt__Audience: ${JWT_AUDIENCE:-SiteManagement.Clients}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-14}
      Admin__BootstrapEmail: ${ADMIN_BOOTSTRAP_EMAIL:-}
      Admin__BootstrapPassword: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      Admin__BootstrapFullName: ${ADMIN_BOOTSTRAP_FULL_NAME:-Site Admin}
      # Cors:AllowedOrigins is read as an array; the colon-prefixed __0__
      # index syntax sets the first entry. Add more with __1__, __2__, ...
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN_0:-}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  payment-api:
    build:
      context: .
      dockerfile: payment-service/src/PaymentService.Api/Dockerfile
    container_name: sitemgmt-payment-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8090"
      # Root-auth Mongo connection (compose seeds root creds); authSource=admin.
      Mongo__ConnectionString: >-
        mongodb://${MONGO_ROOT_USER:-mongoroot}:${MONGO_ROOT_PASSWORD:-mongo_dev_pw}@mongo:27017/?authSource=admin
      Mongo__Database: ${PAYMENT_DB:-payments}
      # Service-to-service API key the main API must present (same value both sides).
      ApiKey__Value: ${PAYMENT_API_KEY:-dev-payment-api-key}
    ports:
      - "${PAYMENT_API_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  postgres-data:
  mongo-data:
