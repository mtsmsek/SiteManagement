<h2 mat-dialog-title>{{ data.titleKey | translate }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <p class="dialog-note">{{ data.hintKey | translate }}</p>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ data.labelKey | translate }}</mat-label>
      <input matInput type="number" formControlName="amount" inputmode="decimal" min="0" step="0.01" />
      <span matTextSuffix>₺</span>
      @if (form.controls.amount.touched && form.controls.amount.invalid) {
        <mat-error>{{ 'billing.amountEdit.invalid' | translate }}</mat-error>
      }
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
    <button matButton="filled" type="submit">{{ 'common.save' | translate }}</button>
  </mat-dialog-actions>
</form>
