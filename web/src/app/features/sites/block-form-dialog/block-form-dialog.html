<h2 mat-dialog-title>{{ 'sites.blocks.add' | translate }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'sites.blocks.name' | translate }}</mat-label>
      <input matInput formControlName="name" />
      @if (form.controls.name.touched && form.controls.name.hasError('required')) {
        <mat-error>{{ 'sites.blocks.nameRequired' | translate }}</mat-error>
      }
      @if (form.controls.name.hasError('server')) {
        <mat-error>{{ form.controls.name.getError('server') }}</mat-error>
      }
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
    <button matButton="filled" type="submit" [disabled]="submitting()">{{ 'common.create' | translate }}</button>
  </mat-dialog-actions>
</form>
